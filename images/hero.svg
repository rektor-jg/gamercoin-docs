<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1115"/>
      <stop offset="100%" stop-color="#1F1418"/>
    </linearGradient>
    <radialGradient id="glow1" cx="78%" cy="40%" r="42%">
      <stop offset="0%" stop-color="#E83C41" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#E83C41" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#2AD46F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2AD46F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6"/>
      <feFlood flood-color="#E83C41" flood-opacity="0.55"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#grid)"/>
  <rect width="1600" height="600" fill="url(#glow1)"/>
  <rect width="1600" height="600" fill="url(#glow2)"/>

  <!-- GHX icon, large, with glow -->
  <g filter="url(#iconShadow)">
    <image href="data:image/png;base64," x="120" y="170" width="260" height="260"/>
  </g>

  <!-- Title block -->
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
    <text x="430" y="270" font-size="92" font-weight="800" fill="#F9F9F9" letter-spacing="-2">GamerCoin</text>
    <text x="430" y="340" font-size="44" font-weight="600" fill="#E83C41" letter-spacing="-1">(GHX)</text>
    <text x="430" y="410" font-size="26" font-weight="400" fill="#A0A4AA">Multi-chain utility token of the GamerHash ecosystem</text>

    <!-- Chain pills -->
    <g transform="translate(430, 450)">
      <g transform="translate(0,0)">
        <rect x="0" y="0" rx="20" ry="20" width="140" height="40" fill="#627EEA" fill-opacity="0.18" stroke="#627EEA" stroke-width="1"/>
        <text x="70" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#A6B3FF">Ethereum</text>
      </g>
      <g transform="translate(160,0)">
        <rect x="0" y="0" rx="20" ry="20" width="150" height="40" fill="#F0B90B" fill-opacity="0.18" stroke="#F0B90B" stroke-width="1"/>
        <text x="75" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#FFD86E">BNB Chain</text>
      </g>
      <g transform="translate(330,0)">
        <rect x="0" y="0" rx="20" ry="20" width="120" height="40" fill="#9945FF" fill-opacity="0.18" stroke="#9945FF" stroke-width="1"/>
        <text x="60" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#C8A6FF">Solana</text>
      </g>
    </g>
  </g>

  <!-- Subtle decorative dot in upper right -->
  <circle cx="1450" cy="120" r="3" fill="#E83C41" fill-opacity="0.6"/>
  <circle cx="1490" cy="160" r="2" fill="#2AD46F" fill-opacity="0.5"/>
  <circle cx="1380" cy="180" r="2" fill="#F9F9F9" fill-opacity="0.4"/>
</svg>
